version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    schedule:
      interval: "monthly"
    commit-message:
      # Prefix all commit messages with "chore: "
      prefix: "chore"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"

  - package-ecosystem: "npm"
    directory: "/"
    commit-message:
      prefix: "chore"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"

  - package-ecosystem: "npm"
    directory: "/packages/webapp"
    commit-message:
      prefix: "chore"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"
    groups:
      dependencies:
        dependency-type: "production"
        update-types:
        - "minor"
        - "patch"
      dependencies-major:
        dependency-type: "production"
        update-types:
        - "major"
      dev-dependencies:
        dependency-type: "development"
